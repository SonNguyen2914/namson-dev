name: CI

# V8.1 evaluation — the frontend build/typecheck/lint was never
# independently reproduced. This makes it automatic and blocking, with
# the lockfile enforced (npm ci) so a fresh runner resolves the exact
# dependency stack.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # npm install, not npm ci: Tailwind v4 pulls platform-specific
      # native binaries (@tailwindcss/oxide, lightningcss) whose
      # transitive optional deps (@emnapi/*) can't all be captured in a
      # single lockfile generated on one OS — a known npm limitation.
      # install still pins versions from the committed lockfile and
      # resolves the Linux-only optional deps the runner needs.
      - name: Install
        run: npm install --no-audit --no-fund

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build
